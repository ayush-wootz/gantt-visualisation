<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#171717;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e5e7eb}
body{display:flex;flex-direction:column;overflow:hidden}
#thread{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:12px 14px 8px;gap:10px}
#thread::before{content:'';flex:1;min-height:0}
#thread::-webkit-scrollbar{width:3px}
#thread::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.divider{display:flex;align-items:center;gap:8px;font-size:10px;color:#555;font-weight:600;letter-spacing:.5px;flex-shrink:0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#232323}
.turn{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.meta{font-size:10px;color:#6b7280;text-align:right;padding:0 2px}
.user{background:#4A3D11;color:#b1924f;padding:9px 13px;border-radius:12px 12px 3px 12px;font-size:13px;line-height:1.5;align-self:flex-end;max-width:82%;white-space:pre-wrap;word-break:break-word}
.ai{background:#1c1c1c;border:1px solid #2a2a2a;color:#e5e7eb;padding:9px 13px;border-radius:12px 12px 12px 3px;font-size:13px;line-height:1.5;align-self:flex-start;max-width:82%;white-space:pre-wrap}
.changes{margin-top:9px;background:#141414;border:1px solid #262626;border-radius:8px;overflow:hidden;white-space:normal}
.ch-hd{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700;padding:6px 10px;border-bottom:1px solid #232323;background:#181818}
.ch-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #1f1f1f;font-size:11px}
.ch-row:last-child{border-bottom:none}
.ch-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ch-dot.moved{background:#fbbf24}.ch-dot.completed{background:#86efac}.ch-dot.reopened{background:#fbbf24}.ch-dot.added{background:#93c5fd}.ch-dot.removed{background:#f87171}
.ch-name{color:#fff;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-val{font-family:ui-monospace,monospace;font-size:10px;color:#9ca3af;flex-shrink:0;text-align:right}
.ch-val .old{color:#5a5a5a;text-decoration:line-through}
.ch-val .arr{color:#555;margin:0 4px}
.ch-val .new{color:#fde68a}
.ch-val .done{color:#86efac}
.approved{display:flex;justify-content:center;flex-shrink:0}
.pill{font-size:11px;font-weight:500;color:#86efac;background:rgba(134,239,172,0.1);border:1px solid rgba(134,239,172,0.25);border-radius:999px;padding:4px 14px}
.failed{background:#1c0a0a;border:1px solid #3a1a1a;color:#fca5a5;padding:9px 13px;border-radius:12px;font-size:12px;align-self:flex-start;max-width:82%}
.empty{color:#6b7280;font-size:13px;text-align:center;margin:auto}
/* loading bubble */
.loading{background:#1c1c1c;border:1px solid #2a2a2a;color:#9ca3af;padding:10px 13px;border-radius:12px 12px 12px 3px;font-size:13px;align-self:flex-start;max-width:82%;display:flex;align-items:center;gap:9px}
.spin{width:13px;height:13px;border:1.5px solid #333;border-top-color:#C1A359;border-radius:50%;animation:sp .7s linear infinite;flex:none}
@keyframes sp{to{transform:rotate(360deg)}}
.ldtxt{position:relative;animation:fade 1.4s ease-in-out infinite}
@keyframes fade{0%,100%{opacity:.55}50%{opacity:1}}
.dots::after{content:'';animation:dots 1.4s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
/* composer */
#disclaimer{flex-shrink:0;font-size:10px;color:#4b4b4b;text-align:center;padding:0 12px 6px;font-style:italic}
#composer{flex-shrink:0;border-top:1px solid #232323;background:#171717;padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
#composer.disabled{opacity:.45;pointer-events:none}
#msgInput{flex:1;background:#1f1f1f;border:1px solid #2c2c2c;border-radius:10px;color:#e5e7eb;font-family:inherit;font-size:13px;line-height:1.4;padding:9px 12px;outline:none;resize:none;max-height:96px;min-height:38px}
#msgInput:focus{border-color:#473A1C}
#msgInput::placeholder{color:#555}
#sendBtn{flex:none;width:38px;height:38px;border-radius:10px;border:none;background:#C1A359;color:#171717;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1}
#sendBtn:disabled{background:#2c2c2c;color:#555;cursor:default}
</style>
</head>
<body>
<div id="thread"></div>
<div id="disclaimer" style="display:none">AI can make mistakes while estimating the plan — please review responses.</div>
<div id="composer" class="disabled">
  <textarea id="msgInput" rows="1" placeholder="Ask to regenerate the plan…"></textarea>
  <button id="sendBtn" disabled aria-label="Send">↑</button>
</div>

<script>
(function(){

  // ── config ─────────────────────────────────────────────────────────────────
  var CONFIG={
    SCHEDULE_URL:'https://glide-gantt-ai-scheduler.onrender.com/schedule',
    SCHEDULE_SECRET:'ayush_Wootz_2026'
  };

  // Rotating loader copy. Cycles (modulo) so long waits keep moving.
  var LOAD_MSGS=[
    'Reading your request',
    'Building the plan',
    'Checking dispatch feasibility',
    'Sequencing the phases',
    'Finalising the schedule'
  ];

  var META=null;          // meta block from payload (null → composer stays disabled)
  var baseTurns=[];       // turns parsed from the payload
  var liveTurns=[];       // turns created this session (not yet in the payload)
  var sending=false;

  function allTurns(){ return baseTurns.concat(liveTurns); }
  function rerender(){ render(allTurns()); }

  // ── read + decode the raw payload ───────────────────────────────────────────
  function readRaw(){
    var hash=(location.hash||'').replace(/^#/,'');
    var search=location.search||'';
    var raw='';

    var hm=hash.match(/(?:^|&)data=([^&]*)/);

    if(hm) raw=decodeURIComponent(hm[1]);
    else if(hash&&hash[0]!=='?') raw=decodeURIComponent(hash);
    else{ var p=new URLSearchParams(search); raw=p.get('data')||''; }

    if(!raw) return null;

    try{
      var b64=raw.replace(/-/g,'+').replace(/_/g,'/');
      while(b64.length%4) b64+='=';
      var decoded=decodeURIComponent(escape(atob(b64)));
      if(decoded[0]==='['||decoded[0]==='{') return decoded;
    }catch(e){}

    return raw;
  }

  // Accepts the bare rows array (legacy) OR { rows, meta }. Sets META when present.
  function parsePayload(raw){
    var data;

    var sanitised=raw.replace(/\n/g,'\\n').replace(/\r/g,'');
    var trimmed=sanitised.trim();

    try{
      data=JSON.parse(trimmed);
    }catch(e){
      try{ data=JSON.parse(trimmed[0]==='['?trimmed:'['+trimmed+']'); }
      catch(e2){ return []; }
    }

    // { rows, meta } shape
    if(data&&!Array.isArray(data)&&Array.isArray(data.rows)){
      META=data.meta||null;
      data=data.rows;
    }
    // [{ rows, meta }] safety
    if(Array.isArray(data)&&data.length===1&&data[0]&&Array.isArray(data[0].rows)){
      META=data[0].meta||META;
      data=data[0].rows;
    }

    if(!Array.isArray(data)) data=[data];

    var turns=data.map(normaliseRow).sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});

    // Only show "Changes since last approved" for turns AFTER the most recent
    // approval. Approving makes that state the new baseline, so change tables on
    // already-approved turns are settled history.
    var lastApprovedIdx=-1;
    turns.forEach(function(t,i){ if(t.isApproved) lastApprovedIdx=i; });
    if(lastApprovedIdx>=0){
      turns.forEach(function(t,i){ if(i<=lastApprovedIdx) t.changes=[]; });
    }

    return turns;
  }

  // Normalise a single row → turn object (also parses the changes block + warnings).
  function normaliseRow(row){
    var rawSummary=(row.summary||'')
      .replace(/^\[DRAFT\]\s*/,'')
      .replace(/\\n/g,'\n')
      .trim();

    var summary=rawSummary;
    var changes=[];

    var chSplit=rawSummary.split(/\nChanges since approved:\s*\n?/);
    if(chSplit.length>1){
      rawSummary=chSplit[0].trim();
      summary=rawSummary;
      var lines=chSplit[1].split('\n');
      for(var i=0;i<lines.length;i++){
        var t=lines[i].trim();
        if(!t||t.indexOf('|')<0) break;
        var parts=t.split('|');
        changes.push({
          kind:(parts[0]||'').trim(),
          process:(parts[1]||'').trim(),
          before:(parts[2]||'').trim(),
          after:(parts[3]||'').trim()
        });
      }
    }

    // Strip warnings from the prose (not rendered in the UI).
    var warnSplit=rawSummary.split(/\nAI warnings:\s*/);
    if(warnSplit.length>1) summary=warnSplit[0].trim();

    var isApproved=!row.message&&/plan approved/i.test(summary);
    var isFailed=/^validation failed/i.test(summary);

    var dispatch='';
    if(isApproved){
      var m=summary.match(/Dispatch:\s*([\d-]+)/i);
      if(m) dispatch=m[1];
    }

    return {
      ts:row.ts,
      by:row.by,
      message:row.message||'',
      summary:(isApproved||isFailed)?'':summary,
      changes:changes,
      isApproved:isApproved,
      isFailed:isFailed,
      dispatch:dispatch,
      pending:false,
      pendingText:'',
      error:''
    };
  }

  // ── formatting helpers ──────────────────────────────────────────────────────
  function fmtDay(iso){
    if(!iso) return '';
    try{
      var d=new Date(iso);
      return d.getUTCDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
    }catch(e){ return ''; }
  }
  function fmtTime(iso){
    if(!iso) return '';
    try{
      var d=new Date(iso);
      return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
    }catch(e){ return ''; }
  }

  // ── render ───────────────────────────────────────────────────────────────────
  function render(turns){
    var el=document.getElementById('thread');
    el.innerHTML='';

    if(!turns.length){
      var e=document.createElement('div');
      e.className='empty'; e.textContent='No messages yet';
      el.appendChild(e);
      return;
    }

    var lastDay='';
    turns.forEach(function(t){
      try{
        var day=fmtDay(t.ts);
        if(day&&day!==lastDay){
          lastDay=day;
          var d=document.createElement('div');
          d.className='divider'; d.textContent=day; el.appendChild(d);
        }

        if(t.isApproved){
          var wrap=document.createElement('div');
          wrap.className='approved';
          var dispatch=t.dispatch?'· '+t.dispatch+' dispatch ':'';
          wrap.innerHTML='<div class="pill">✓ Plan approved '+dispatch+'· '+fmtTime(t.ts)+'</div>';
          el.appendChild(wrap); return;
        }

        var turn=document.createElement('div');
        turn.className='turn';

        var by=(t.by||'').replace(/@.*/,'');
        var meta=document.createElement('div');
        meta.className='meta';
        meta.textContent=(by?by+' · ':'')+fmtTime(t.ts);
        turn.appendChild(meta);

        if(t.message){
          var u=document.createElement('div');
          u.className='user'; u.textContent=t.message;
          turn.appendChild(u);
        }

        if(t.pending){
          var ld=document.createElement('div');
          ld.className='loading';
          ld.innerHTML='<span class="spin"></span><span class="ldtxt">'+(t.pendingText||LOAD_MSGS[0])+'</span><span class="dots"></span>';
          turn.appendChild(ld);
        }else if(t.isFailed){
          var f=document.createElement('div');
          f.className='failed';
          f.textContent='Could not apply — validation error. Try rephrasing.';
          turn.appendChild(f);
        }else if(t.error){
          var er=document.createElement('div');
          er.className='failed'; er.textContent=t.error;
          turn.appendChild(er);
        }else if(t.summary||(t.changes&&t.changes.length)){
          var a=document.createElement('div');
          a.className='ai';

          if(t.summary){
            var txt=document.createElement('div');
            txt.textContent=t.summary;
            a.appendChild(txt);
          }

          if(t.changes&&t.changes.length){
            var box=document.createElement('div');
            box.className='changes';
            var hd=document.createElement('div');
            hd.className='ch-hd'; hd.textContent='Changes since last approved';
            box.appendChild(hd);

            t.changes.forEach(function(c){
              var r=document.createElement('div'); r.className='ch-row';
              var dot=document.createElement('div'); dot.className='ch-dot '+c.kind; r.appendChild(dot);
              var nm=document.createElement('div'); nm.className='ch-name'; nm.textContent=c.process; r.appendChild(nm);
              var val=document.createElement('div'); val.className='ch-val';
              if(c.kind==='completed'||c.kind==='reopened'){
                val.innerHTML='<span class="done">'+(c.after||c.kind)+'</span>';
              }else if(c.kind==='moved'&&c.before){
                val.innerHTML='<span class="old">'+c.before+'</span><span class="arr">→</span><span class="new">'+c.after+'</span>';
              }else if(c.kind==='added'){
                val.innerHTML='<span class="new">+ '+(c.after||'added')+'</span>';
              }else if(c.kind==='removed'){
                val.innerHTML='<span class="old">'+(c.before||'')+'</span> removed';
              }else{
                val.innerHTML='<span class="new">'+(c.after||'')+'</span>';
              }
              r.appendChild(val);
              box.appendChild(r);
            });
            a.appendChild(box);
          }

          turn.appendChild(a);
        }

        el.appendChild(turn);
      }catch(rowErr){
        console.error('thread row render failed',rowErr,t);
      }
    });

    try{
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ el.scrollTop=el.scrollHeight; });
      });
    }catch(scrollErr){}
  }

  // ── send / regenerate ────────────────────────────────────────────────────────
  function sendMessage(){
    if(sending||!META) return;
    var input=document.getElementById('msgInput');
    var text=(input.value||'').trim();
    if(!text) return;

    sending=true;
    input.value='';
    input.style.height='auto';
    updateSendBtn();

    var turn={
      ts:new Date().toISOString(),
      by:(META.generated_by||''),
      message:text,
      summary:'', changes:[],
      isApproved:false, isFailed:false,
      pending:true, pendingText:LOAD_MSGS[0], error:''
    };
    liveTurns.push(turn);
    rerender();

    // rotate the loader copy (cycles so long waits keep moving)
    var mi=0;
    var ticker=setInterval(function(){
      mi++;
      turn.pendingText=LOAD_MSGS[mi%LOAD_MSGS.length];
      var nodes=document.querySelectorAll('.ldtxt');
      if(nodes.length) nodes[nodes.length-1].textContent=turn.pendingText;
    },1400);

    var payload={
      assembly_row_id:    META.assembly_row_id    || '',
      assembly_number:    META.assembly_number    || '',
      project_number:     META.project_number     || '',
      dispatch_date:      META.dispatch_date      || '',
      planned_start_date: META.planned_start_date || '',
      generated_by:       META.generated_by       || '',
      draft_mode:         true,
      draft_row_id:       META.draft_row_id        || '',
      update_glide:       true,
      last_approved_at:   META.last_approved_at    || '',
      message:            text,
      context:            text
    };

    fetch(CONFIG.SCHEDULE_URL,{
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-schedule-secret':CONFIG.SCHEDULE_SECRET },
      body:JSON.stringify(payload)
    })
    .then(function(res){
      if(!res.ok) return res.text().then(function(t){ throw new Error('HTTP '+res.status+': '+t); });
      return res.json();
    })
    .then(function(data){
      clearInterval(ticker);
      var rawSummary=data.summary||data.ai_summary||(data.row&&data.row.summary)||'';
      var norm=normaliseRow({ ts:new Date().toISOString(), by:META.generated_by, message:'', summary:rawSummary });
      turn.pending=false;
      turn.summary=norm.summary;
      turn.changes=norm.changes;
      turn.isFailed=norm.isFailed;
      // Prefer the structured changes array if the backend returns it.
      if((!turn.changes||!turn.changes.length) && Array.isArray(data.changes_since_approved)){
        turn.changes=data.changes_since_approved;
      }
      if(data.draft_row_id) META.draft_row_id=data.draft_row_id;
      sending=false; updateSendBtn(); rerender();
    })
    .catch(function(err){
      clearInterval(ticker);
      turn.pending=false;
      turn.error='Could not regenerate — '+err.message+'. Try again.';
      sending=false; updateSendBtn(); rerender();
      console.error('regenerate error:',err);
    });
  }

  // ── composer wiring ──────────────────────────────────────────────────────────
  function updateSendBtn(){
    var input=document.getElementById('msgInput');
    var btn=document.getElementById('sendBtn');
    var has=(input.value||'').trim().length>0;
    btn.disabled=sending||!has||!META;
  }

  function setupComposer(){
    var input=document.getElementById('msgInput');
    var btn=document.getElementById('sendBtn');
    var composer=document.getElementById('composer');

    if(META){
      composer.classList.remove('disabled');
      document.getElementById('disclaimer').style.display='block';
    }

    input.addEventListener('input',function(){
      input.style.height='auto';
      input.style.height=Math.min(input.scrollHeight,96)+'px';
      updateSendBtn();
    });
    input.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
    });
    btn.addEventListener('click',sendMessage);
  }

  // ── boot ─────────────────────────────────────────────────────────────────────
  try{
    var raw=readRaw();
    baseTurns = raw ? parsePayload(raw) : [];
  }catch(parseErr){
    console.error('thread parse failed',parseErr);
  }

  try{
    setupComposer();
    rerender();
  }catch(renderErr){
    document.getElementById('thread').innerHTML='<div class="empty">Error: '+renderErr.message+'</div>';
  }

})();
</script>
</body>
</html>
