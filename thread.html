<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#141414;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e5e7eb}
body{display:flex;flex-direction:column;overflow:hidden}
#thread{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:12px 14px 8px;gap:12px}
#thread::before{content:'';flex:1}
#thread::-webkit-scrollbar{width:3px}
#thread::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.divider{display:flex;align-items:center;gap:8px;font-size:10px;color:#555;font-weight:600;letter-spacing:.5px;flex-shrink:0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#232323}
.turn{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.meta{font-size:10px;color:#6b7280;padding:0 2px}
.meta.right{text-align:right}
.bubbles{display:flex;flex-direction:column;gap:4px}
.bubble{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5;max-width:85%;word-break:break-word}
.bubble.user{background:#78350f;color:#fde68a;border-bottom-right-radius:3px;align-self:flex-end}
.bubble.ai{background:#1c1c1c;border:1px solid #2a2a2a;color:#e5e7eb;border-bottom-left-radius:3px;align-self:flex-start}
.warn{font-size:11.5px;color:#9ca3af;margin-top:6px;padding-top:6px;border-top:1px solid #2a2a2a}
.warn-item{display:flex;gap:5px;margin-bottom:3px}
.warn-item::before{content:'⚠';font-size:10px;margin-top:1px;flex-shrink:0;color:#f59e0b}
.approved{display:flex;justify-content:center;flex-shrink:0}
.approved-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#86efac;background:rgba(134,239,172,0.1);border:1px solid rgba(134,239,172,0.25);border-radius:999px;padding:4px 14px}
.empty{color:#6b7280;font-size:13px;text-align:center;margin:auto}
</style>
</head>
<body>
<div id="thread"><div class="empty" id="empty">No messages yet</div></div>
<script>
(function(){
  function readData(){
    const hash=(location.hash||'').replace(/^#/,'');
    const search=location.search||'';
    let raw='';
    const hm=hash.match(/(?:^|&)data=([^&]*)/);
    if(hm)raw=hm[1];
    else if(hash&&hash[0]!=='?')raw=hash;
    else{const p=new URLSearchParams(search);raw=p.get('data')||'';}
    if(!raw)return null;
    raw=decodeURIComponent(raw);
    if(raw[0]==='['||raw[0]==='{')return raw;
    let b64=raw.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4)b64+='=';
    return decodeURIComponent(escape(atob(b64)));
  }

  function fmtDate(iso){
    if(!iso)return'';
    try{
      const d=new Date(iso);
      return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()]+', '+
        d.getUTCDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
    }catch(e){return iso.slice(0,10);}
  }
  function fmtTime(iso){
    if(!iso)return'';
    try{
      const d=new Date(iso);
      return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
    }catch(e){return'';}
  }

  function render(turns){
    const el=document.getElementById('thread');
    const empty=document.getElementById('empty');
    if(!turns||!turns.length){return;}
    empty.remove();

    let lastDay='';
    turns.forEach(t=>{
      const day=fmtDate(t.ts);
      if(day&&day!==lastDay){
        lastDay=day;
        const d=document.createElement('div');
        d.className='divider'; d.textContent=day; el.appendChild(d);
      }

      if(t.type==='approved'){
        const wrap=document.createElement('div');
        wrap.className='approved';
        wrap.innerHTML='<span class="approved-pill">✓ Plan approved · '+(t.dispatch||'')+(t.ts?' · '+fmtTime(t.ts):'')+'</span>';
        el.appendChild(wrap); return;
      }

      const turn=document.createElement('div');
      turn.className='turn';

      const by=(t.by||'').replace(/@.*/,'');
      const meta=document.createElement('div');
      meta.className='meta right';
      meta.textContent=(by?by+' · ':'')+fmtTime(t.ts);
      turn.appendChild(meta);

      const bubbles=document.createElement('div');
      bubbles.className='bubbles';

      if(t.message){
        const u=document.createElement('div');
        u.className='bubble user'; u.textContent=t.message;
        bubbles.appendChild(u);
      }

      if(t.summary){
        const a=document.createElement('div');
        a.className='bubble ai';
        a.textContent=t.summary;
        if(t.warnings&&t.warnings.length){
          const w=document.createElement('div');
          w.className='warn';
          t.warnings.forEach(txt=>{
            const wi=document.createElement('div');
            wi.className='warn-item';
            wi.textContent=txt;
            w.appendChild(wi);
          });
          a.appendChild(w);
        }
        bubbles.appendChild(a);
      }

      turn.appendChild(bubbles);
      el.appendChild(turn);
    });

    requestAnimationFrame(()=>{ el.scrollTop=el.scrollHeight; });
  }

  try{
    const raw=readData();
    if(!raw){
      render([
        {ts:'2026-06-10T16:34:00Z',by:'zai@wootz.work',message:'Decrease final QC time to 3 days',summary:'Final QC & Packaging cut to 3 days (11 Jun – 13 Jun). Completion is now 13 Jun, 2 days before dispatch.',warnings:['Realistic completion 13 Jun is before dispatch target — schedule has buffer.']},
        {ts:'2026-06-10T17:26:00Z',by:'zai@wootz.work',message:'Decrease final QC time to 1 day',summary:'Final QC & Packaging reduced to 1 day (11 Jun – 11 Jun). Completion 11 Jun, 4 days ahead of dispatch target.',warnings:['Completion 11 Jun is 4 days before dispatch — schedule has buffer.']},
        {type:'approved',ts:'2026-06-10T17:27:00Z',by:'zai@wootz.work',dispatch:'2026-06-15'},
        {ts:'2026-06-11T17:39:00Z',by:'zai@wootz.work',message:'Can you decrease final QC time to 1 day',summary:'Final QC & Packaging reduced to 1 day (11 Jun – 11 Jun). Completion now 11 Jun, 4 days ahead of dispatch.',warnings:['Completion before dispatch target — schedule has buffer.']},
      ]);
      return;
    }
    const data=JSON.parse(raw);
    render(Array.isArray(data)?data:[]);
  }catch(e){
    document.getElementById('thread').innerHTML='<div class="empty">Error: '+e.message+'</div>';
  }
})();
</script>
</body>
</html>
