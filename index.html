<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Schedule</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #151821;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --grid: #262a35;
    --grid-faint: #1d2030;
    --grid-strong: #374151;
    --today: #ef4444;
    --dispatch: #22c55e;
    --warn: #ef4444;
    --warn-bg: #2a1416;
    --ok: #22c55e;
    --ok-bg: #0f2018;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { padding: 16px; min-height: 100vh; }
  .header {
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .title {
    font-size: 18px; font-weight: 600;
    color: var(--text); margin: 0;
    letter-spacing: -0.01em;
  }
  .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .status-banner {
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-banner.warn { background: var(--warn-bg); color: #fca5a5; border: 1px solid #5a1e22; }
  .status-banner.ok { background: var(--ok-bg); color: #86efac; border: 1px solid #14432a; }
  .status-banner b { font-weight: 600; }
  .chart-container {
    overflow-x: auto;
    background: var(--panel);
    border-radius: 8px;
    border: 1px solid var(--grid);
  }
  .empty, .error { padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px; }
  .error {
    color: #fca5a5;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; text-align: left;
    white-space: pre-wrap; word-break: break-word;
  }
  svg { display: block; }
  svg text { font-family: inherit; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1 class="title">Project Schedule</h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div id="status"></div>
  <div class="chart-container" id="chart"></div>
</div>

<script>
(function() {
  const PHASE_COLORS = [
    '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6',
    '#ef4444', '#06b6d4', '#ec4899', '#84cc16',
  ];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Date format assumption: D/M/YYYY (Indian/UK). Toggle if needed.
  const DATE_FORMAT_DMY = true;

  function fmtDate(d) { return d.getUTCDate() + ' ' + MONTHS[d.getUTCMonth()]; }
  function fmtDateFull(d) { return d.getUTCDate() + ' ' + MONTHS[d.getUTCMonth()] + ' ' + d.getUTCFullYear(); }
  function startOfUTCDay(d) { return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()); }
  function daysBetween(a, b) { return Math.round((startOfUTCDay(b) - startOfUTCDay(a)) / 86400000); }
  function addDays(ms, n) {
    const d = new Date(ms);
    return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() + n);
  }
  function phaseColor(p) {
    if (typeof p !== 'number' || isNaN(p)) p = 0;
    const idx = ((Math.max(1, p) - 1) % PHASE_COLORS.length + PHASE_COLORS.length) % PHASE_COLORS.length;
    return PHASE_COLORS[idx];
  }
  function showError(msg) {
    document.getElementById('chart').innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
  }
  function showEmpty(msg) {
    document.getElementById('chart').innerHTML = '<div class="empty">' + escapeHtml(msg) + '</div>';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function escapeSvg(s) {
    return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
  }
  function truncate(s, max) {
    if (s.length <= max) return s;
    return s.slice(0, Math.max(1, max - 1)) + '…';
  }

  function readPayload() {
    let raw = '';
    if (location.hash) {
      const h = location.hash.replace(/^#/, '');
      const m = h.match(/(?:^|&)data=([^&]+)/);
      if (m) raw = decodeURIComponent(m[1]);
      else raw = decodeURIComponent(h);
    } else if (location.search) {
      const params = new URLSearchParams(location.search);
      raw = params.get('data') || '';
    }
    return raw || null;
  }

  // Decode (base64 → text) or pass through
  function decodePayload(raw) {
    const trimmed = raw.trim();
    if (trimmed[0] === '{' || trimmed[0] === '[' || /^\d/.test(trimmed)) {
      // Looks like text already (starts with JSON or a digit like "1/6/2026")
      return trimmed;
    }
    try {
      let b64 = trimmed.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      return decodeURIComponent(escape(atob(b64)));
    } catch (e) {
      return trimmed;
    }
  }

  // Parse the combined string: "<dispatch>, <json>, <json>, ..."
  // Returns { dispatch: Date|null, processes: array }
  function parseCombined(text) {
    text = text.trim();

    // Pure JSON array case (no dispatch prefix)
    if (text.startsWith('[')) {
      return { dispatch: null, processes: JSON.parse(text) };
    }

    // Find the first occurrence of `{` — everything before it is the dispatch prefix
    const firstBrace = text.indexOf('{');
    if (firstBrace < 0) {
      throw new Error('No process JSON found in input.');
    }

    let dispatchStr = '';
    let processStr = '';

    if (firstBrace === 0) {
      // No dispatch prefix
      processStr = text;
    } else {
      dispatchStr = text.slice(0, firstBrace).replace(/,\s*$/, '').trim();
      processStr = text.slice(firstBrace).trim();
    }

    // Wrap process objects in array brackets if needed
    if (processStr.startsWith('{')) {
      processStr = '[' + processStr + ']';
    }

    const processes = JSON.parse(processStr);
    const dispatch = dispatchStr ? parseDispatchDate(dispatchStr) : null;

    return { dispatch: dispatch, processes: processes };
  }

  // Parse "1/6/2026, 12:00:00 AM" → Date (assumes D/M/YYYY)
  function parseDispatchDate(s) {
    s = s.trim();
    // Try direct Date parse first for ISO-like strings
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
      const d = new Date(s);
      if (!isNaN(d.getTime())) return d;
    }

    // Match "D/M/YYYY[, H:MM:SS AM/PM]"
    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:,?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?)?/i);
    if (m) {
      let part1 = parseInt(m[1], 10);
      let part2 = parseInt(m[2], 10);
      const year = parseInt(m[3], 10);
      let day, month;
      if (DATE_FORMAT_DMY) { day = part1; month = part2 - 1; }
      else { month = part1 - 1; day = part2; }
      let hour = m[4] ? parseInt(m[4], 10) : 0;
      const min = m[5] ? parseInt(m[5], 10) : 0;
      const sec = m[6] ? parseInt(m[6], 10) : 0;
      const ampm = m[7] ? m[7].toUpperCase() : null;
      if (ampm === 'PM' && hour < 12) hour += 12;
      if (ampm === 'AM' && hour === 12) hour = 0;
      const d = new Date(Date.UTC(year, month, day, hour, min, sec));
      if (!isNaN(d.getTime())) return d;
    }

    // Fall back to native Date parsing
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    throw new Error('Could not parse dispatch date: "' + s + '"');
  }

  function normalize(arr) {
    if (!Array.isArray(arr)) {
      if (arr && typeof arr === 'object') arr = [arr];
      else throw new Error('Process input is not an array');
    }
    return arr.map((p, i) => {
      const name = p.Name || p.name || p.process || ('Process ' + (i + 1));
      const sRaw = p['Start date'] || p.start_date || p.startDate || p.start;
      const eRaw = p['End date'] || p.end_date || p.endDate || p.end;
      const phaseRaw = p.Phase !== undefined ? p.Phase : (p.phase !== undefined ? p.phase : 1);
      const phase = parseInt(phaseRaw, 10) || 1;
      const sd = new Date(sRaw);
      const ed = new Date(eRaw);
      if (isNaN(sd.getTime()) || isNaN(ed.getTime())) {
        throw new Error('Invalid date for process "' + name + '" (start="' + sRaw + '", end="' + eRaw + '")');
      }
      return {
        name: String(name),
        phase: phase,
        start: startOfUTCDay(sd),
        end: startOfUTCDay(ed),
      };
    });
  }

  function renderStatus(latestEnd, dispatch) {
    if (!dispatch) return;
    const dispatchDay = startOfUTCDay(dispatch);
    const diff = daysBetween(new Date(latestEnd), new Date(dispatchDay));
    const el = document.getElementById('status');
    if (diff < 0) {
      el.innerHTML = '<div class="status-banner warn">⚠ <b>Schedule exceeds dispatch by ' + Math.abs(diff) + ' day' + (Math.abs(diff) === 1 ? '' : 's') + '.</b> Last process ends ' + fmtDateFull(new Date(latestEnd)) + ', dispatch is ' + fmtDateFull(new Date(dispatchDay)) + '.</div>';
    } else if (diff === 0) {
      el.innerHTML = '<div class="status-banner ok">✓ <b>On track.</b> Last process ends on dispatch date (' + fmtDateFull(new Date(dispatchDay)) + ').</div>';
    } else {
      el.innerHTML = '<div class="status-banner ok">✓ <b>On track · ' + diff + ' day' + (diff === 1 ? '' : 's') + ' slack.</b> Last process ends ' + fmtDateFull(new Date(latestEnd)) + ', dispatch is ' + fmtDateFull(new Date(dispatchDay)) + '.</div>';
    }
  }

  function render(processes, dispatch) {
    processes.sort((a, b) => (a.phase - b.phase) || (a.start - b.start) || a.name.localeCompare(b.name));

    let minDay = Infinity, maxDay = -Infinity;
    processes.forEach(p => {
      if (p.start < minDay) minDay = p.start;
      if (p.end > maxDay) maxDay = p.end;
    });
    const latestEnd = maxDay;

    // Today
    const todayMs = startOfUTCDay(new Date());

    // Extend range to include today and dispatch
    if (todayMs < minDay) minDay = todayMs;
    if (todayMs > maxDay) maxDay = todayMs;
    let dispatchMs = null;
    if (dispatch) {
      dispatchMs = startOfUTCDay(dispatch);
      if (dispatchMs < minDay) minDay = dispatchMs;
      if (dispatchMs > maxDay) maxDay = dispatchMs;
    }

    // Add a tiny pad day on each side so markers don't sit on the edge
    minDay = addDays(minDay, -1);
    maxDay = addDays(maxDay, 1);

    const totalDays = daysBetween(new Date(minDay), new Date(maxDay)) + 1;

    // Subtitle
    const subParts = [
      fmtDate(new Date(minDay)) + ' – ' + fmtDateFull(new Date(maxDay)),
      totalDays + ' days',
      processes.length + ' processes',
    ];
    if (dispatch) subParts.push('Dispatch: ' + fmtDateFull(new Date(dispatchMs)));
    document.getElementById('subtitle').textContent = subParts.join('  ·  ');

    // Status banner
    renderStatus(latestEnd, dispatch);

    // Legend (phases + today + dispatch)
    const phases = [...new Set(processes.map(p => p.phase))].sort((a, b) => a - b);
    const legendEl = document.getElementById('legend');
    let legendHtml = phases.map(ph =>
      '<span class="legend-item"><span class="legend-swatch" style="background:' + phaseColor(ph) + '"></span>Phase ' + ph + '</span>'
    ).join('');
    legendHtml += '<span class="legend-item"><span class="legend-swatch" style="background:#ef4444"></span>Today</span>';
    if (dispatch) legendHtml += '<span class="legend-item"><span class="legend-swatch" style="background:#22c55e"></span>Dispatch</span>';
    legendEl.innerHTML = legendHtml;

    // Tick interval
    let tickEvery;
    if (totalDays <= 14) tickEvery = 1;
    else if (totalDays <= 30) tickEvery = 2;
    else if (totalDays <= 60) tickEvery = 5;
    else if (totalDays <= 120) tickEvery = 7;
    else tickEvery = 14;

    // Layout
    const LABEL_W = 200;
    const PAD_L = 12;
    const PAD_R = 16;
    const ROW_H = 36;
    const BAR_H = 22;
    const HEADER_H = 32;
    const PAD_B = 16;
    const minChartWidth = 640;
    const dayW = Math.max(18, Math.floor(minChartWidth / totalDays));
    const chartW = totalDays * dayW;
    const svgW = LABEL_W + PAD_L + chartW + PAD_R;
    const svgH = HEADER_H + processes.length * ROW_H + PAD_B;
    const dayToX = (dayMs) => LABEL_W + PAD_L + daysBetween(new Date(minDay), new Date(dayMs)) * dayW;

    let svg = '<svg width="' + svgW + '" height="' + svgH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg">';

    // Alternating row backgrounds + phase dividers
    for (let i = 0; i < processes.length; i++) {
      if (i > 0 && processes[i].phase !== processes[i - 1].phase) {
        const y = HEADER_H + i * ROW_H;
        svg += '<line x1="0" y1="' + y + '" x2="' + svgW + '" y2="' + y + '" stroke="#374151" stroke-width="1" />';
      }
      if (i % 2 === 1) {
        svg += '<rect x="0" y="' + (HEADER_H + i * ROW_H) + '" width="' + svgW + '" height="' + ROW_H + '" fill="#181b24" />';
      }
    }

    // Vertical gridlines + date labels
    for (let d = 0; d < totalDays; d++) {
      const dayMs = addDays(minDay, d);
      const x = dayToX(dayMs);
      if (d % tickEvery === 0) {
        const dt = new Date(dayMs);
        svg += '<text x="' + (x + 2) + '" y="20" font-size="11" fill="#9ca3af">' + escapeSvg(fmtDate(dt)) + '</text>';
        svg += '<line x1="' + x + '" y1="' + HEADER_H + '" x2="' + x + '" y2="' + (svgH - PAD_B) + '" stroke="#262a35" stroke-width="1" />';
      } else {
        svg += '<line x1="' + x + '" y1="' + HEADER_H + '" x2="' + x + '" y2="' + (svgH - PAD_B) + '" stroke="#1d2030" stroke-width="1" />';
      }
    }
    svg += '<line x1="' + (LABEL_W + PAD_L + chartW) + '" y1="' + HEADER_H + '" x2="' + (LABEL_W + PAD_L + chartW) + '" y2="' + (svgH - PAD_B) + '" stroke="#262a35" stroke-width="1" />';
    svg += '<line x1="' + LABEL_W + '" y1="0" x2="' + LABEL_W + '" y2="' + svgH + '" stroke="#262a35" stroke-width="1" />';
    svg += '<line x1="0" y1="' + HEADER_H + '" x2="' + svgW + '" y2="' + HEADER_H + '" stroke="#374151" stroke-width="1" />';

    // Bars
    processes.forEach((p, i) => {
      const rowY = HEADER_H + i * ROW_H;
      const barY = rowY + (ROW_H - BAR_H) / 2;
      const x0 = dayToX(p.start);
      const days = daysBetween(new Date(p.start), new Date(p.end)) + 1;
      const w = Math.max(dayW * 0.7, days * dayW - 2);
      const color = phaseColor(p.phase);
      const labelText = truncate(p.name, 26);

      svg += '<text x="' + (LABEL_W - 10) + '" y="' + (rowY + ROW_H / 2 + 4) + '" font-size="12" fill="#e5e7eb" text-anchor="end">' + escapeSvg(labelText) + '</text>';
      svg += '<rect x="' + x0 + '" y="' + barY + '" width="' + w + '" height="' + BAR_H + '" rx="4" ry="4" fill="' + color + '" />';

      const durText = days + 'd';
      if (w >= 30) {
        svg += '<text x="' + (x0 + w / 2) + '" y="' + (barY + BAR_H / 2 + 4) + '" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">' + durText + '</text>';
      } else {
        svg += '<text x="' + (x0 + w + 4) + '" y="' + (barY + BAR_H / 2 + 4) + '" font-size="11" fill="#9ca3af">' + durText + '</text>';
      }
    });

    // Dispatch marker (draw before Today so Today renders on top if they coincide)
    if (dispatchMs !== null) {
      const x = dayToX(dispatchMs);
      svg += '<line x1="' + x + '" y1="' + HEADER_H + '" x2="' + x + '" y2="' + (svgH - PAD_B) + '" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" />';
      svg += '<rect x="' + (x - 26) + '" y="' + (HEADER_H + 2) + '" width="52" height="14" rx="2" fill="#22c55e" />';
      svg += '<text x="' + x + '" y="' + (HEADER_H + 12) + '" font-size="10" fill="#0f1115" text-anchor="middle" font-weight="700">Dispatch</text>';
    }

    // Today marker
    if (todayMs >= minDay && todayMs <= maxDay) {
      const x = dayToX(todayMs);
      svg += '<line x1="' + x + '" y1="' + HEADER_H + '" x2="' + x + '" y2="' + (svgH - PAD_B) + '" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />';
      const labelY = HEADER_H + 18; // Push below dispatch label if both present
      svg += '<rect x="' + (x - 18) + '" y="' + labelY + '" width="36" height="14" rx="2" fill="#ef4444" />';
      svg += '<text x="' + x + '" y="' + (labelY + 10) + '" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Today</text>';
    }

    svg += '</svg>';
    document.getElementById('chart').innerHTML = svg;
  }

  // Main
  try {
    const raw = readPayload();
    if (!raw) {
      showEmpty('No data. Append ?data=<input> or #data=<base64> to the URL.');
      return;
    }
    const decoded = decodePayload(raw);
    let combined;
    try {
      combined = parseCombined(decoded);
    } catch (e) {
      showError('Could not parse input.\n\n' + e.message + '\n\nFirst 400 chars of decoded input:\n' + decoded.slice(0, 400));
      return;
    }
    let processes;
    try {
      processes = normalize(combined.processes);
    } catch (e) {
      showError(e.message);
      return;
    }
    if (processes.length === 0) {
      showEmpty('No processes to display.');
      return;
    }
    render(processes, combined.dispatch);
  } catch (e) {
    showError('Unexpected error: ' + e.message);
  }
})();
</script>
</body>
</html>
